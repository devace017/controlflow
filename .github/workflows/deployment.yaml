name: Deployment Workflow
on: 
  push:
    branches:
      - master
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
      - name: Cache Dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: dep_node_module-${{ hashFiles('**/package-lock.json')}}
      - name: Install Dependencies
        run: npm ci
      - name: Test Code
        run: npm run test
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
      - name: Cache Dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: dep_node_module-${{ hashFiles('**/package-lock.json')}}
      - name: Install Dependencies
        run: npm ci
      - name: Test Code
        run: npm run lint
  build: 
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v5
      - name: Cache Dependencies
        uses: actions/cache@v5
        with: 
          path: ~/.npm
          key: dep_node_module-${{ hashFiles('**/package-lock.json')}}
      - name: Install Dependencies
        run: npm ci
      - name: Upload Artifacts
        uses: actions/upload-artifacts@v3
        with: 
          name: dist-files
          path: dist
      - name: Build Code
        run: npm run build
  deploy: 
    needs: builds
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifacts@v3
        with: 
          name: dist-files
      - name: Output Contents
        run: ls
      - name: Deploy Code
        run: echo "Deploying..."



    